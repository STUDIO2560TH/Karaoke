name: Sync Lyrics

on:
  push:
    paths:
      - 'lyrics/*.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for lyrics files
        id: check
        run: |
          if ls lyrics/*.txt 1>/dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Found lyrics files to process:"
            ls -la lyrics/*.txt
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No lyrics files found in lyrics/ folder"
          fi

      - name: Set up Python
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.check.outputs.found == 'true'
        run: pip install -r requirements.txt

      - name: Process lyrics files
        if: steps.check.outputs.found == 'true'
        run: |
          for file in lyrics/*.txt; do
            echo "========================================"
            echo "Processing: $file"
            echo "========================================"
            python sync_lyrics.py "$file" --model small --output output
            echo ""
          done

      - name: Delete processed lyrics files
        if: steps.check.outputs.found == 'true'
        run: |
          for file in lyrics/*.txt; do
            rm "$file"
            echo "Deleted: $file"
          done

      - name: Commit and push results
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git add lyrics/
          git status
          git diff --cached --quiet || git commit -m "🎶 Auto-synced lyrics subtitles"
          git push
